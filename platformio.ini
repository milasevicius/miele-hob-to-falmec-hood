; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.partitions = min_spiffs.csv
build_unflags =
  -std=gnu++17
build_flags =
  -std=gnu++2b
  -D MIELE_CLIENT_ID=\"${sysenv.MIELE_CLIENT_ID}\"
  -D MIELE_CLIENT_SECRET=\"${sysenv.MIELE_CLIENT_SECRET}\"
  -D MIELE_REFRESH_TOKEN=\"${sysenv.MIELE_REFRESH_TOKEN}\"
  -D MIELE_DEVICE_ID=\"${sysenv.MIELE_DEVICE_ID}\"
  -D HOMESPAN_SKETCH_VERSION=\"1.0.0\"
lib_deps =
  bblanchon/ArduinoJson@7.4.1
  bblanchon/StreamUtils@1.9.2
  HomeSpan/HomeSpan@2.1.2
  sebmillet/rf433send@0.5.5
lib_ldf_mode = deep
monitor_speed = 115200

[env:m5stack-atom]
board = m5stack-atom
build_flags =
	${env.build_flags}
  -D RF_TX_PIN=26
  -D HOMESPAN_BUTTON_PIN=39
  -D HOMESPAN_PIXEL_PIN=27
